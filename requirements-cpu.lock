# CPU-only lock for juniper-cascor-worker (Phase 4E, CW-02).
#
# This lock pins everything the worker needs EXCEPT torch, which the
# Dockerfile installs separately from the official PyTorch CPU index
# (https://download.pytorch.org/whl/cpu) so we avoid the ~2-4 GB of NVIDIA
# CUDA wheels that the GPU lock would otherwise pull in transitively.
#
# Regeneration command:
#   echo "torch==2.10.0+cpu" > /tmp/torch-cpu-override
#   uv pip compile pyproject.toml \
#     --no-emit-package torch \
#     --override /tmp/torch-cpu-override \
#     -o requirements-cpu.lock
#
# Bump the torch pin in the override file when upgrading torch; everything
# else flows through to the lock automatically.
#
# Companion lock with full NVIDIA stack: ``requirements.lock`` (preserved
# as the legacy default for dev/laptop GPU installs).
