---
#####################################################################################################################################################################################################
# Project:       Juniper
# Sub-Project:   JuniperCascorWorker
# Application:   juniper_cascor_worker
# File Name:     lockfile-update.yml
# Author:        Paul Calnon
# Version:       0.1.0
#
# Date Created:  2026-05-02
# Last Modified: 2026-05-02
#
# License:       MIT License
# Copyright:     Copyright (c) 2024-2026 Paul Calnon
#
# Description:
#    Automatically updates requirements.lock when Dependabot pushes a dependency
#    update to a dependabot/pip/** branch. Runs uv pip compile to regenerate
#    the lockfile and commits the result so downstream Docker / CI builds
#    stay in sync with the bumped dependency's transitive pins.
#
#    Uses CROSS_REPO_DISPATCH_TOKEN (not GITHUB_TOKEN) so the push re-triggers CI.
#    See juniper-ml/notes/V17_V18_CROSS_REPO_DISPATCH_TOKEN_SETUP_2026-05-02.md
#    for the secret-provisioning walkthrough.
#
#    The previous lockfile was compiled with:
#       uv pip compile pyproject.toml --no-emit-package torch -o requirements.lock
#    This workflow preserves that invocation so the regeneration is
#    bit-for-bit consistent with the existing lockfile header.
#####################################################################################################################################################################################################

name: Update Lockfile (Dependabot)

on:
  push:
    branches:
      - dependabot/pip/**

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Update requirements.lock
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.CROSS_REPO_DISPATCH_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv==0.11.8

      - name: Regenerate requirements.lock
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║       Juniper Cascor Worker - Regenerate Lockfile          ║"
          echo "╚════════════════════════════════════════════════════════════╝"

          # --upgrade is required because uv pip compile reads the existing -o
          # file as pins by default and won't bump transitive deps without it.
          # --no-emit-package torch matches the existing lockfile header — torch
          # is installed separately (see CI install steps) so we deliberately
          # omit it from the compiled pin set.
          uv pip compile pyproject.toml \
            --no-emit-package torch \
            --upgrade \
            -o requirements.lock

      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add requirements.lock
          if git diff --cached --quiet; then
            echo "::notice::Lockfile already up to date — no commit needed"
          else
            git commit -m "[dependabot skip] Update requirements.lock"
            git push
          fi
