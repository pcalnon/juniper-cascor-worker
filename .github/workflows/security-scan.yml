name: Scheduled Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]" pip-audit
          pip install -e ".[test]"

      - name: Create reports directory
        run: mkdir -p reports/security

      - name: Run Bandit (SAST)
        run: |
          bandit -r juniper_cascor_worker -f sarif -o reports/security/bandit.sarif --exit-zero
          bandit -r juniper_cascor_worker --confidence-level medium --severity-level medium

      - name: Run pip-audit (Dependency Vulnerabilities)
        run: pip-audit --strict --desc on

      - name: Upload Security Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        if: always()
        with:
          name: security-reports
          path: reports/security/
          retention-days: 30
