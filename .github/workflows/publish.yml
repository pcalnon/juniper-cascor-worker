name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Verify TestPyPI install
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sleep 30
          # NOTE (security): install with --no-deps against TestPyPI only. Do NOT add a
          # production-PyPI fallback index here — with --no-deps no deps are fetched, so a
          # fallback only risks resolving a squatted target package. The sleep above
          # covers TestPyPI index lag.
          pip install --no-deps --index-url https://test.pypi.org/simple/ juniper-cascor-worker==${VERSION}
          # --no-deps leaves numpy/torch/juniper-config-tools (+ other runtime deps) absent, so the
          # package cannot be imported here; assert the published version via importlib.metadata instead.
          python -c "import importlib.metadata as m; print('TestPyPI install OK', m.version('juniper-cascor-worker'))"

  pypi:
    name: Publish to PyPI
    needs: testpypi
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v7.0.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
